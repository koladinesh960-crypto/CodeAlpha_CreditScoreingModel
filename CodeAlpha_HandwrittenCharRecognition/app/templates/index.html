<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Character Recognition — CodeAlpha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>✍️ Handwritten Character Recognition</h1>
            <p class="subtitle">Draw a letter on the canvas and let the CNN predict it</p>
        </header>

        <div class="canvas-section">
            <div class="canvas-wrapper">
                <canvas id="drawCanvas" width="280" height="280"></canvas>
            </div>
            <div class="controls">
                <button id="predictBtn" class="btn btn-primary">🔍 Predict</button>
                <button id="clearBtn" class="btn btn-secondary">🗑️ Clear</button>
            </div>
        </div>

        <div id="resultSection" class="result-section hidden">
            <div class="result-card">
                <div class="prediction-main">
                    <span class="predicted-char" id="predictedChar">A</span>
                    <span class="confidence" id="confidence">95.2%</span>
                </div>
                <div class="top5">
                    <h3>Top 5 Predictions</h3>
                    <div id="top5List" class="top5-list"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>CodeAlpha Machine Learning Internship — Handwritten Character Recognition</p>
        </footer>
    </div>

    <script>
        // ---- Canvas Drawing Logic ----
        const canvas = document.getElementById("drawCanvas");
        const ctx = canvas.getContext("2d");
        let drawing = false;

        // White background
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drawing settings
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        canvas.addEventListener("mousedown", (e) => {
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        });
        canvas.addEventListener("mousemove", (e) => {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        });
        canvas.addEventListener("mouseup", () => { drawing = false; });
        canvas.addEventListener("mouseleave", () => { drawing = false; });

        // Touch support
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        });
        canvas.addEventListener("touchend", () => { drawing = false; });

        // ---- Clear ----
        document.getElementById("clearBtn").addEventListener("click", () => {
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById("resultSection").classList.add("hidden");
        });

        // ---- Predict ----
        document.getElementById("predictBtn").addEventListener("click", async () => {
            const imgData = canvas.toDataURL("image/png");

            const btn = document.getElementById("predictBtn");
            btn.textContent = "⏳ Predicting...";
            btn.disabled = true;

            try {
                const resp = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: imgData }),
                });
                const data = await resp.json();

                if (data.success) {
                    document.getElementById("predictedChar").textContent = data.prediction;
                    document.getElementById("confidence").textContent = data.confidence;

                    const top5 = document.getElementById("top5List");
                    top5.innerHTML = data.top5.map(
                        (item) => `<div class="top5-item"><span class="t5-char">${item.char}</span><span class="t5-prob">${item.prob}</span></div>`
                    ).join("");

                    document.getElementById("resultSection").classList.remove("hidden");
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Request failed: " + err.message);
            } finally {
                btn.textContent = "🔍 Predict";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
